# Linux
#--------------------------------------------------------------------------------------------------

- job: linux64
  pool:
    vmImage: "ubuntu-22.04"
  steps:
  - checkout: none
  - bash: |
      sudo apt-get update -qq
      sudo apt-get -y install zip git
      git clone https://github.com/omega-gg/VLC
      docker build -t vlc-snap VLC/snap
      chmod 777 .
      docker run -d --name vlc-snap -v $PWD:/VLC vlc-snap tail -f /dev/null
      docker exec -t vlc-snap bash -c "cd /VLC/VLC &&
                                       sh build.sh linuxSnap"
      cd VLC/deploy
      zip -rq ../../VLC.zip *
  - publish: $(System.DefaultWorkingDirectory)/VLC.zip
    artifact: VLC-linux64

